<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axes Setup - Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080c12;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .screen {
    width: 1024px;
    background: #0d1224;
    border-radius: 12px;
    border: 1px solid #1e2530;
    overflow: hidden;
  }

  /* Top bar: mode toggle + quick actions */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: #0d1224;
    border-bottom: 1px solid #1e2530;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #1e2530;
  }

  .mode-btn {
    padding: 12px 28px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    color: #94a3b8;
    background: #0d1830;
  }

  .mode-btn.active-rest {
    background: #08507a;
    color: #e2e8f0;
    box-shadow: inset 0 -3px 0 #1a8fc4;
  }

  .mode-btn.active-start {
    background: #087830;
    color: #e2e8f0;
    box-shadow: inset 0 -3px 0 #22c55e;
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .quick-label {
    font-size: 13px;
    color: #485570;
    margin-right: 4px;
  }

  .quick-btn {
    padding: 10px 18px;
    font-size: 15px;
    font-weight: 600;
    background: #121830;
    color: #94a3b8;
    border: 1px solid #1e2530;
    border-radius: 6px;
    cursor: pointer;
  }

  .quick-btn:hover { background: #1a2540; color: #e2e8f0; }

  /* Step size row */
  .step-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    background: #0a0f1a;
    border-bottom: 1px solid #1e2530;
  }

  .step-label {
    font-size: 14px;
    color: #485570;
    margin-right: 8px;
  }

  .step-toggle {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1e2530;
  }

  .step-btn {
    padding: 8px 22px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    background: #0d1830;
    color: #94a3b8;
  }

  .step-btn.active {
    background: #1e2d4a;
    color: #e2e8f0;
  }

  .step-unit {
    font-size: 14px;
    color: #485570;
    margin-left: 8px;
  }

  /* Axis rows */
  .axes-container {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .axis-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: #0d1830;
    border-radius: 10px;
    border: 1px solid #1e2530;
    gap: 16px;
  }

  .axis-indicator {
    width: 5px;
    height: 56px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .axis-info {
    min-width: 180px;
    flex-shrink: 0;
  }

  .axis-letter {
    font-size: 24px;
    font-weight: 800;
  }

  .axis-name {
    font-size: 13px;
    color: #64748b;
    margin-top: 2px;
  }

  .axis-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: center;
  }

  .jog-btn {
    width: 72px;
    height: 56px;
    font-size: 26px;
    font-weight: 800;
    border: 1px solid #1e2530;
    border-radius: 8px;
    cursor: pointer;
    background: #121830;
    color: #94a3b8;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }

  .jog-btn:hover { background: #1a2540; color: #e2e8f0; border-color: #3a4560; }
  .jog-btn:active { background: #243050; }

  .pos-display {
    min-width: 140px;
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    color: #22c55e;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }

  .saved-value {
    min-width: 120px;
    text-align: center;
    flex-shrink: 0;
  }

  .saved-label {
    font-size: 11px;
    color: #485570;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .saved-num {
    font-size: 20px;
    font-weight: 600;
    color: #64748b;
    font-variant-numeric: tabular-nums;
  }

  /* Axis colors */
  .axis-a .axis-indicator { background: #faac0b; }
  .axis-a .axis-letter { color: #faac0b; }

  .axis-b .axis-indicator { background: #a855f7; }
  .axis-b .axis-letter { color: #a855f7; }

  .axis-c .axis-indicator { background: #06b6d4; }
  .axis-c .axis-letter { color: #06b6d4; }

  .axis-d .axis-indicator { background: #fabf0b; }
  .axis-d .axis-letter { color: #fabf0b; }

  /* Save button area */
  .save-area {
    padding: 16px 20px 20px;
    display: flex;
    justify-content: center;
  }

  .save-btn {
    padding: 16px 60px;
    font-size: 20px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: #e2e8f0;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .save-btn.rest {
    background: #084f78;
    box-shadow: 0 2px 8px rgba(8, 79, 120, 0.4);
  }

  .save-btn.start {
    background: #087830;
    box-shadow: 0 2px 8px rgba(8, 120, 48, 0.4);
  }

  .save-btn:hover { transform: translateY(-1px); filter: brightness(1.15); }

  /* Interactive demo */
  .hidden { display: none !important; }

  .axis-row.disabled-row {
    opacity: 0.25;
    pointer-events: none;
  }

  .demo-note {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: #485570;
    background: #080c12;
    border-top: 1px solid #1e2530;
  }
</style>
</head>
<body>

<div class="screen">

  <!-- Top bar: Mode toggle + Quick actions -->
  <div class="top-bar">
    <div class="mode-toggle">
      <button class="mode-btn active-rest" id="btn-rest" onclick="setMode('rest')">Set Rest Points</button>
      <button class="mode-btn" id="btn-start" onclick="setMode('start')">Set Start Points</button>
    </div>
    <div class="quick-actions">
      <span class="quick-label">Quick:</span>
      <button class="quick-btn">Go to Rest</button>
      <button class="quick-btn">Go to Start</button>
      <button class="quick-btn">Home All</button>
    </div>
  </div>

  <!-- Step size -->
  <div class="step-row">
    <span class="step-label">Step Size</span>
    <div class="step-toggle">
      <button class="step-btn active" onclick="setStep(this, 10)">10</button>
      <button class="step-btn" onclick="setStep(this, 5)">5</button>
      <button class="step-btn" onclick="setStep(this, 1)">1</button>
    </div>
    <span class="step-unit">mm</span>
  </div>

  <!-- Axis rows -->
  <div class="axes-container">

    <div class="axis-row axis-a">
      <div class="axis-indicator"></div>
      <div class="axis-info">
        <div class="axis-letter">A</div>
        <div class="axis-name">Knife Length</div>
      </div>
      <div class="saved-value">
        <div class="saved-label" id="saved-label-A">Saved Rest</div>
        <div class="saved-num" id="saved-A">12400.0</div>
      </div>
      <div class="axis-controls">
        <button class="jog-btn" onclick="jog('A',-1)">&lt;&lt;</button>
        <div class="pos-display" id="pos-A">12450.0</div>
        <button class="jog-btn" onclick="jog('A',1)">&gt;&gt;</button>
      </div>
    </div>

    <div class="axis-row axis-b">
      <div class="axis-indicator"></div>
      <div class="axis-info">
        <div class="axis-letter">B</div>
        <div class="axis-name">Knife Curve</div>
      </div>
      <div class="saved-value">
        <div class="saved-label" id="saved-label-B">Saved Rest</div>
        <div class="saved-num" id="saved-B">8150.0</div>
      </div>
      <div class="axis-controls">
        <button class="jog-btn" onclick="jog('B',-1)">&lt;&lt;</button>
        <div class="pos-display" id="pos-B">8200.0</div>
        <button class="jog-btn" onclick="jog('B',1)">&gt;&gt;</button>
      </div>
    </div>

    <div class="axis-row axis-c">
      <div class="axis-indicator"></div>
      <div class="axis-info">
        <div class="axis-letter">C</div>
        <div class="axis-name">Grinder Up/Down</div>
      </div>
      <div class="saved-value">
        <div class="saved-label" id="saved-label-C">Saved Rest</div>
        <div class="saved-num" id="saved-C">3100.0</div>
      </div>
      <div class="axis-controls">
        <button class="jog-btn" onclick="jog('C',-1)">&lt;&lt;</button>
        <div class="pos-display" id="pos-C">3100.0</div>
        <button class="jog-btn" onclick="jog('C',1)">&gt;&gt;</button>
      </div>
    </div>

    <div class="axis-row axis-d" id="row-D">
      <div class="axis-indicator"></div>
      <div class="axis-info">
        <div class="axis-letter">D</div>
        <div class="axis-name">Knife Angle</div>
      </div>
      <div class="saved-value">
        <div class="saved-label" id="saved-label-D">Saved Rest</div>
        <div class="saved-num" id="saved-D">40.0</div>
      </div>
      <div class="axis-controls">
        <button class="jog-btn" onclick="jog('D',-1)">&lt;&lt;</button>
        <div class="pos-display" id="pos-D">45.0</div>
        <button class="jog-btn" onclick="jog('D',1)">&gt;&gt;</button>
      </div>
    </div>

  </div>

  <!-- Save button -->
  <div class="save-area">
    <button class="save-btn rest" id="save-btn" onclick="save()">SAVE AS REST POINTS</button>
  </div>

  <div class="demo-note">Interactive mockup - click buttons to test. Positions are simulated.</div>
</div>

<script>
  let currentMode = 'rest';
  let stepSize = 10;
  const positions = { A: 12450.0, B: 8200.0, C: 3100.0, D: 45.0 };
  // Simulated saved values from controller
  const savedRest  = { A: 12400.0, B: 8150.0, C: 3100.0, D: 40.0 };
  const savedStart = { A: 12500.0, B: 8300.0, C: 3200.0, D: 50.0 };

  function setMode(mode) {
    currentMode = mode;
    const btnRest = document.getElementById('btn-rest');
    const btnStart = document.getElementById('btn-start');
    const saveBtn = document.getElementById('save-btn');

    btnRest.className = mode === 'rest' ? 'mode-btn active-rest' : 'mode-btn';
    btnStart.className = mode === 'start' ? 'mode-btn active-start' : 'mode-btn';
    saveBtn.className = mode === 'rest' ? 'save-btn rest' : 'save-btn start';
    saveBtn.textContent = mode === 'rest' ? 'SAVE AS REST POINTS' : 'SAVE AS START POINTS';

    // Update saved value displays for each axis
    const saved = mode === 'rest' ? savedRest : savedStart;
    const label = mode === 'rest' ? 'Saved Rest' : 'Saved Start';
    ['A','B','C','D'].forEach(axis => {
      document.getElementById('saved-label-' + axis).textContent = label;
      document.getElementById('saved-' + axis).textContent = saved[axis].toFixed(1);
    });
  }

  function setStep(btn, size) {
    stepSize = size;
    document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function jog(axis, dir) {
    positions[axis] += dir * stepSize;
    document.getElementById('pos-' + axis).textContent = positions[axis].toFixed(1);
  }

  function save() {
    const label = currentMode === 'rest' ? 'Rest' : 'Start';
    const target = currentMode === 'rest' ? savedRest : savedStart;
    // "Write" current positions as new saved values
    ['A','B','C','D'].forEach(axis => {
      target[axis] = positions[axis];
      document.getElementById('saved-' + axis).textContent = target[axis].toFixed(1);
    });
    alert(`Saved ${label} Points:\nA: ${positions.A}\nB: ${positions.B}\nC: ${positions.C}\nD: ${positions.D}`);
  }
</script>

</body>
</html>
